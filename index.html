<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
         <div class="search">
            <input type = "text" placeholder="city name" spellcheck="false">
            <button><img src = "weather-app-img/images/search.png"></button>
         </div>
         <div class="weather">
            <img src = "weather-app-img/images/rain.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                    <div class="col">
                        <img src = "weather-app-img/images/humidity.png">
                    <div>
                        <p class = "humidity">50%</p>
                        <p>Humidity</p>
                    </div>

                </div>
                <div class="detail">
                    <div class="col">
                        <img src = "weather-app-img/images/wind.png">
                    <div>
                        <p class = "wind">15km/h</p>
                        <p>Wind Speed</p>
                    </div>

                </div>
                </div>
                
            </div>
         </div>
    </div>
    <script>
        const apikey = "2a30454bc6645782a4b0da8760e33e8a";
        const apiBase = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
        const searchBtn = document.querySelector('.search button');
        const searchBox = document.querySelector('.search input');
        const weatherIcon = document.querySelector('.weather-icon');
        async function checkWeather(city = "bangalore"){
            try {
                const url = apiBase + encodeURIComponent(city) + `&appid=${apikey}`;
                const response = await fetch(url);
                if(!response.ok){
                    console.error('API error', response.status, response.statusText);
                    const err = await response.json().catch(()=>null);
                    console.error(err);
                    return;
                }
                const data = await response.json();
                console.log(data);
                // TODO: update DOM with `data`
                document.querySelector('.city').innerHTML = data.name;
                document.querySelector('.temp').innerHTML = Math.round(data.main.temp) + "°C";
                document.querySelector('.humidity').innerHTML = data.main.humidity + "%";
                document.querySelector('.wind').innerHTML = data.wind.speed + " km/h";
                if(data.weather[0].main == "Clouds"){
                    weatherIcon.src = "weather-app-img/images/clouds.png"; 
                }
                else if(data.weather[0].main == "Clear"){
                    weatherIcon.src = "weather-app-img/images/clear.png"; 
                }
                else if(data.weather[0].main == "Rain"){
                    weatherIcon.src = "weather-app-img/images/rain.png"; 
                }
                else if(data.weather[0].main == "Drizzle"){
                    weatherIcon.src = "weather-app-img/images/drizzle.png"; 
                }
                else if(data.weather[0].main == "Mist"){
                    weatherIcon.src = "weather-app-img/images/mist.png"; 
                }
                
            } catch (e) {
                console.error('Fetch failed', e);
            }
        }

        document.querySelector('.search button').addEventListener('click', ()=>{
            const city = document.querySelector('.search input').value.trim();
            if(city) checkWeather(city);
        });
        searchBox.addEventListener("click"), ()=>{
            checkWeather(searchBox.value);
        };
        
    </script> 
</body>
</html>
